<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISM FOR THE PEOPLE</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:#fff;
    color:#111;
    line-height:1.5;
}

header{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:2rem;
}

h1{
    font-size:3rem;
    letter-spacing:4px;
}

p{
    max-width:600px;
    margin:1rem auto;
}

.button{
    display:inline-block;
    padding:14px 30px;
    margin-top:20px;
    background:black;
    color:white;
    text-decoration:none;
}

.featured{
    padding:4rem 1rem;
}

.grid{
    display:grid;
    grid-template-columns:1fr;
    gap:20px;
}

.product{
    border:1px solid #ddd;
    padding:1rem;
}

.product img{
    width:100%;
    display:block;
}

footer{
    padding:3rem 1rem;
    text-align:center;
    border-top:1px solid #ddd;
}

@media(min-width:768px){

.grid{
    grid-template-columns:repeat(3,1fr);
}

h1{
    font-size:5rem;
}

}
</style>
</head>

<body>

<header>

<h1>ISM FOR THE PEOPLE</h1>

<p>
Independent apparel, ideas, and objects.
</p>

<a href="shop.html" class="button">SHOP NOW</a>

</header>

<section class="featured">

<h2 style="text-align:center;margin-bottom:2rem;">
FEATURED
</h2>

<div class="grid">

<div class="product">
<img src="images/hoodie.jpg" alt="">
<h3>Logo Hoodie</h3>
<p>$65</p>
</div>

<div class="product">
<img src="images/tee.jpg" alt="">
<h3>Graphic Tee</h3>
<p>$35</p>
</div>

<div class="product">
<img src="images/hat.jpg" alt="">
<h3>Cap</h3>
<p>$30</p>
</div>

</div>

</section>

<footer>

<p>
© ISM FOR THE PEOPLE 2026
</p>

<p>
<a href="https://www.instagram.com/ismforthepeople/">
Instagram
</a>
</p>

</footer>

</body>
</html>
