<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:#fff;
    font-family:Helvetica, Arial, sans-serif;
}

a{
    text-decoration:none;
    color:inherit;
}

img{
    width:100%;
    display:block;
}

.hero{
    padding:3rem 1rem;
    display:flex;
    justify-content:center;
}

.logo{
    width:min(700px,90vw);
    height:auto;
}

.gallery{
    display:grid;
    grid-template-columns:1fr;
    gap:12px;
    padding:0 1rem;
}

.gallery img{
    aspect-ratio:4/5;
    object-fit:cover;
    transition:.3s ease;
}

.gallery img:hover{
    opacity:.85;
}

.products{
    max-width:1200px;
    margin:0 auto;
    padding:5rem 1rem;
}

.product-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:60px;
    justify-items:center;
}

.product{
    text-align:center;
    width:100%;
    max-width:320px;
}

.product img{
    aspect-ratio:4/5;
    object-fit:cover;
    margin-bottom:1rem;
    transition:.3s ease;
}

.product img:hover{
    opacity:.85;
}

.product h3{
    font-size:1rem;
    font-style:italic;
    font-weight:700;
    letter-spacing:.05em;

    background:linear-gradient(
        90deg,
        #ff2b2b,
        #00ff66,
        #ffd400
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
}

.about{
    max-width:700px;
    margin:0 auto;
    padding:4rem 1.5rem;
    text-align:center;
}

.about h2{
    margin-bottom:1rem;
    font-size:.9rem;
    text-transform:uppercase;
    letter-spacing:.2em;
    font-style:italic;
}

.about p{
    color:rgba(255,255,255,.8);
    line-height:1.8;
}

footer{
    text-align:center;
    padding:3rem 1rem;
}

.footer-links{
    margin-bottom:1rem;
}

.footer-links a{
    margin:0 1rem;
    font-style:italic;
}

.copyright{
    opacity:.5;
    font-size:.85rem;
}

@media(min-width:768px){

.gallery{
    grid-template-columns:repeat(2,1fr);
}

.product-grid{
    grid-template-columns:repeat(2,320px);
    justify-content:center;
}

}

@media(min-width:1200px){

.gallery{
    grid-template-columns:repeat(3,1fr);
}

.product-grid{
    grid-template-columns:repeat(3,320px);
    justify-content:center;
}

}

</style>
</head>

<body>

<section class="hero">
    <img src="images/logo.png" alt="" class="logo">
</section>

<section class="gallery">

    <a href="archive.html">
        <img src="images/gallery-1.jpg" alt="">
    </a>

    <a href="archive.html">
        <img src="images/gallery-2.jpg" alt="">
    </a>

    <a href="archive.html">
        <img src="images/gallery-3.jpg" alt="">
    </a>

    <a href="archive.html">
        <img src="images/gallery-4.jpg" alt="">
    </a>

    <a href="archive.html">
        <img src="images/gallery-5.jpg" alt="">
    </a>

    <a href="archive.html">
        <img src="images/gallery-6.jpg" alt="">
    </a>

</section>

<section class="products">

    <div class="product-grid">

        <div class="product">
            <a href="watch.html">
                <img src="images/watch.jpg" alt="">
            </a>
            <h3>ISM Contraband Watch</h3>
        </div>

        <div class="product">
            <a href="logo-tee.html">
                <img src="images/logo-tee.jpg" alt="">
            </a>
            <h3>ISM Logo Tee</h3>
        </div>

        <div class="product">
            <a href="belt.html">
                <img src="images/belt.jpg" alt="">
            </a>
            <h3>Snakeskin ISM Belt</h3>
        </div>

    </div>

</section>

<section class="about">

    <h2>About</h2>

    <p>
        ISM is an independent label exploring fashion,
        culture, and everyday objects through limited releases and seasonal collections.
    </p>

</section>

<footer>

    <div class="footer-links">
        <a href="archive.html">Archive</a>
        <a href="https://instagram.com/ismforthepeople" target="_blank">Instagram</a>
    </div>

    <p class="copyright">
        © ISM FOR THE PEOPLE 2026
    </p>

</footer>

</body>
</html>
