<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#F0EAD6;
    color:#fff;
    font-family:Helvetica, Arial, sans-serif;
}

a{
    text-decoration:none;
    color:inherit;
}

img{
    width:100%;
    display:block;
}

.hero{
    padding:3rem 1rem;
    display:flex;
    justify-content:center;
}

.logo{
    width:min(700px,90vw);
    height:auto;
}

/* HORIZONTAL SCROLL GALLERY */

.gallery{
    display:flex;
    gap:12px;
    overflow-x:auto;
    overflow-y:hidden;
    padding:0 1rem 1rem;
    scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch;
}

.gallery::-webkit-scrollbar{
    display:none;
}

.gallery a{
    flex:0 0 auto;
    width:min(80vw,450px);
    scroll-snap-align:start;
}

.gallery img{
    width:100%;
    aspect-ratio:4/5;
    object-fit:cover;
    transition:.3s ease;
}

.gallery img:hover{
    opacity:.85;
}

.products{
    max-width:1200px;
    margin:0 auto;
    padding:5rem 1rem;
}

.product-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:60px;
    justify-items:center;
}

.product{
    text-align:center;
    width:100%;
    max-width:320px;
}

.product img{
    aspect-ratio:4/5;
    object-fit:cover;
    margin-bottom:1rem;
    transition:.3s ease;
}

.product img:hover{
    opacity:.85;
}

.product h3{
    font-size:1rem;
    font-style:italic;
    font-weight:700;
    letter-spacing:.05em;

    background:linear-gradient(
        90deg,
        #ff2b2b,
        #00ff66,
        #ffd400
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
}

.about{
    max-width:700px;
    margin:0 auto;
    padding:4rem 1.5rem;
    text-align:center;
}

.about h2{
    margin-bottom:1rem;
    font-size:.9rem;
    text-transform:uppercase;
    letter-spacing:.2em;
    font-style:italic;

    background:linear-gradient(
        90deg,
        #ff2b2b,
        #00ff66,
        #ffd400
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
}

.about p{
    line-height:1.8;

    background:linear-gradient(
        90deg,
        #ff2b2b,
        #00ff66,
        #ffd400
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
}

footer{
    text-align:center;
    padding:3rem 1rem;
}

.footer-links{
    margin-bottom:1rem;
}

.footer-links a{
    margin:0 1rem;
    font-style:italic;

    background:linear-gradient(
        90deg,
        #ff2b2b,
        #00ff66,
        #ffd400
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
}

.copyright{
    font-size:.85rem;

    background:linear-gradient(
        90deg,
        #ff2b2b,
        #00ff66,
        #ffd400
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
}

@media(min-width:768px){

.product-grid{
    grid-template-columns:repeat(2,320px);
    justify-content:center;
}

}

@media(min-width:1200px){

.product-grid{
    grid-template-columns:repeat(3,320px);
    justify-content:center;
}

}

</style>
</head>

<body>

<section class="hero">
    <img src="images/ISMLOGO.png" alt="" class="logo">
</section>

<section class="gallery">

    </a>

    <a href="archive.html">

    </a>

    <a href="archive.html">

    <a href="archive.html">
        <img src="images/IMG_8618.jpeg" alt="">
    </a>

    <a href="archive.html">
        <img src="images/IMG_6933.jpeg" alt="">
    </a>

    <a href="archive.html">
        <img src="images/11997A29-8147-4E9D-9503-DFCA4B6D9A6A.jpeg" alt="">
    </a>

</section>

<section class="products">

    <div class="product-grid">

        <div class="product">

            </a>
            <h3>ISM Contraband Tank Watch</h3>
        </div>

        <div class="product">

    <p>

</body>
</html>
