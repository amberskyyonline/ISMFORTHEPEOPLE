<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#F0EAD6;
    font-family:Helvetica, Arial, sans-serif;
}

a{
    text-decoration:none;
    color:inherit;
}

img,
iframe{
    width:100%;
    display:block;
}

.header{
    text-align:center;
    padding:4rem 1rem 2rem;
}

.header h1{
    font-size:1rem;
    font-style:italic;
    letter-spacing:.2em;
    text-transform:uppercase;

    background:linear-gradient(
        90deg,
        #ff2b2b,
        #00ff66,
        #ffd400
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
}

.archive-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
    padding:0 12px 4rem;
}

.archive-item{
    overflow:hidden;
}

.archive-item img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:.3s ease;
}

.archive-item iframe{
    width:100%;
    aspect-ratio:4/5;
    border:none;
}

.archive-item img:hover{
    opacity:.85;
}

.wide{
    grid-column:span 2;
}

.footer{
    text-align:center;
    padding:3rem 1rem;
}

.footer a{
    font-style:italic;

    background:linear-gradient(
        90deg,
        #ff2b2b,
        #00ff66,
        #ffd400
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
}

@media(min-width:768px){

.archive-grid{
    grid-template-columns:repeat(4,1fr);
}

.wide{
    grid-column:span 2;
}

}

</style>
</head>

<body>

<section class="header">

    <h1>Archive</h1>

</section>

<section class="archive-grid">

    <div class="archive-item">
        <img src="images/archive-1.jpg" alt="">
    </div>

    <div class="archive-item">
        <img src="images/archive-2.jpg" alt="">
    </div>

    <div class="archive-item">
        <iframe
            src="https://amber-diaz97.wistia.com/s/g54iaucki09xy7k"
            allowfullscreen>
        </iframe>
    </div>

    <div class="archive-item">
        <img src="images/archive-3.jpg" alt="">
    </div>

    <div class="archive-item wide">
        <img src="images/archive-4.jpg" alt="">
    </div>

    <div class="archive-item">
        <img src="images/archive-5.jpg" alt="">
    </div>

    <div class="archive-item">
        <iframe
            src="https://amber-diaz97.wistia.com/s/cp9kae9rc4e5gku"
            allowfullscreen>
        </iframe>
    </div>

    <div class="archive-item">
        <img src="images/archive-6.jpg" alt="">
    </div>

    <div class="archive-item wide">
        <img src="images/archive-7.jpg" alt="">
    </div>

    <div class="archive-item">
        <img src="images/archive-8.jpg" alt="">
    </div>

    <div class="archive-item">
        <img src="images/archive-9.jpg" alt="">
    </div>

    <div class="archive-item">
        <iframe
            src="https://fast.wistia.net/embed/iframe/YOUR_WISTIA_ID_3"
            allowfullscreen>
        </iframe>
    </div>

</section>

<section class="footer">

    <a href="index.html">
        ← Back Home
    </a>

</section>

</body>
</html>
