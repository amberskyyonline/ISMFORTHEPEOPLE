<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://fast.wistia.com/player.js" async></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#F0EAD6;
    font-family:Helvetica,Arial,sans-serif;
}

a{
    text-decoration:none;
    color:inherit;
}

img{
    width:100%;
    display:block;
}

.header{
    text-align:center;
    padding:4rem 1rem 2rem;
}

.header h1{
    font-size:1rem;
    font-style:italic;
    text-transform:uppercase;
    letter-spacing:.2em;

    background:linear-gradient(
        90deg,
        #ff2b2b,
        #00ff66,
        #ffd400
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
}

.archive-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
    padding:0 12px 4rem;
}

.archive-item{
    position:relative;
    overflow:hidden;
    aspect-ratio:4/5;
}

.archive-item img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:.3s ease;
}

.archive-item img:hover{
    opacity:.85;
}

.archive-item wistia-player{
    position:absolute;
    inset:0;
    width:100% !important;
    height:100% !important;
    --wistia-player-object-fit:cover;
}

.wide{
    grid-column:span 2;
}

.footer{
    text-align:center;
    padding:3rem 1rem;
}

.footer a{
    font-style:italic;

    background:linear-gradient(
        90deg,
        #ff2b2b,
        #00ff66,
        #ffd400
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
}

@media(min-width:768px){

.archive-grid{
    grid-template-columns:repeat(4,1fr);
}

.wide{
    grid-column:span 2;
}

}

</style>
</head>

<body>

<section class="header">
<h1>Archive</h1>
</section>
