<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop | ISM FOR THE PEOPLE</title>

<style>

body{
    font-family:Arial,sans-serif;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:2rem;
}

.grid{
    display:grid;
    grid-template-columns:1fr;
    gap:20px;
}

.product{
    border:1px solid #ddd;
    padding:15px;
}

.product img{
    width:100%;
}

.buy{
    display:block;
    background:black;
    color:white;
    text-align:center;
    text-decoration:none;
    padding:12px;
    margin-top:10px;
}

@media(min-width:768px){

.grid{
    grid-template-columns:repeat(3,1fr);
}

}

</style>
</head>

<body>

<h1>SHOP</h1>

<div class="grid">

<div class="product">
<img src="images/hoodie.jpg">
<h2>Logo Hoodie</h2>
<p>$65</p>

<a href="#" class="buy">
BUY NOW
</a>
</div>

<div class="product">
<img src="images/tee.jpg">
<h2>Graphic Tee</h2>
<p>$35</p>

<a href="#" class="buy">
BUY NOW
</a>
</div>

</div>

</body>
</html>
