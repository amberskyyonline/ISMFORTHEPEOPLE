<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Archive</title>

<script src="https://fast.wistia.com/assets/external/E-v1.js" async></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#F0EAD6;
    font-family:Helvetica,Arial,sans-serif;
}

a{
    text-decoration:none;
    color:inherit;
}

.header{
    text-align:center;
    padding:4rem 1rem 2rem;
}

.header h1{
    font-size:1rem;
    font-style:italic;
    letter-spacing:.2em;
    text-transform:uppercase;

    background:linear-gradient(
        90deg,
        #ff2b2b,
        #00ff66,
        #ffd400
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
}

.archive-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
    padding:12px;
}

.gallery{
    position:relative;
    overflow:hidden;
    aspect-ratio:4/5;
    background:#000;
}

.gallery img{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    transition:.3s ease;
}

.gallery img:hover{
    opacity:.85;
}

.gallery .wistia_embed{
    position:absolute;
    top:0;
    left:0;
    width:100%!important;
    height:100%!important;
}

.gallery .wistia_embed iframe,
.gallery .wistia_embed video,
.gallery .wistia_embed canvas{
    width:100%!important;
    height:100%!important;
}

.gallery video{
    object-fit:cover!important;
    transform:scale(1.15);
}

.wide{
    grid-column:span 2;
}

.footer{
    text-align:center;
    padding:3rem 1rem;
}

.footer a{
    font-style:italic;

    background:linear-gradient(
        90deg,
        #ff2b2b,
        #00ff66,
        #ffd400
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
}

@media(min-width:768px){

.archive-grid{
    grid-template-columns:repeat(4,1fr);
}

.wide{
    grid-column:span 2;
}

}

</style>

</head>

<body>

<section class="header">

<h1>Archive</h1>

</section>

<section class="archive-grid">

<div class="gallery">
    <img src="images/archive-1.jpg" alt="">
